{% extends "base.html" %}

{% block title %}Home - Groupdoo{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-8 text-center">
        <h1 class="display-4 mb-4">Welcome to Groupdoo</h1>
        <p class="lead">A secure platform for managing your groups and activities.</p>

        {% if current_user.is_authenticated %}
            <div class="mt-4">
                <a href="{{ url_for('dashboard') }}" class="btn btn-primary btn-lg">Go to Dashboard</a>
            </div>
        {% else %}
            <div class="mt-4">
                <a href="{{ url_for('login') }}" class="btn btn-primary btn-lg me-2">Login</a>
                <a href="{{ url_for('register') }}" class="btn btn-outline-primary btn-lg">Register</a>
            </div>
        {% endif %}
    </div>
</div>
{% endblock %}
